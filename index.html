<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Streaming viewer</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      html, body {
        padding:0;
        margin:0;
        height: 100%;
      }
      webots-view {
        position: absolute!important;
        left: 0;
        width: 100%;
        border: 0px;
        margin: 0px;
        min-width: 320px;
        overflow-x:hidden;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import WebotsView from "https://cyberbotics.com/wwi/R2025a/WebotsView.js";
      const ROBOT_NAME = 'e-puck';
      const SECRET_TOKEN = 'MY_SECRET';
      let webotsView = new WebotsView();
      document.body.appendChild(webotsView);
      webotsView.onready = () => {
        console.log('[token] onready fired');
        let attempts = 0;
        const sendToken = () => {
          const socket = webotsView._view?.stream?.socket;
          const state = socket ? socket.readyState : 'no-socket';
          if (socket && state === WebSocket.OPEN) {
            const payload = 'robot:' + ROBOT_NAME + ':token:' + SECRET_TOKEN;
            socket.send(payload);
            console.log('[token] sent payload (attempt ' + attempts + '):', payload);
          } else {
            if (attempts++ < 50) {
              console.log('[token] socket not ready (state=' + state + '), retrying...');
              setTimeout(sendToken, 200);
            } else
              console.error('[token] gave up waiting for socket.');
          }
        };
        sendToken();
      };
      webotsView.connect('https://simulation.webots.cloud/1999/session?url=https://github.com/cyberbotics/artificialbrains2025a/blob/main/worlds/receive_token.wbt', undefined, undefined, undefined, 900);
    </script>
  </body>

</html>
