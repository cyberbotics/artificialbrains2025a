<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Streaming viewer</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
      html, body {
        padding:0;
        margin:0;
        height: 100%;
      }
      webots-view {
        position: absolute!important;
        left: 0;
        width: 100%;
        border: 0px;
        margin: 0px;
        min-width: 320px;
        overflow-x:hidden;
      }
    </style>
  </head>

  <body>
    <script type="module">
      import WebotsView from "https://cyberbotics.com/wwi/R2025a/WebotsView.js";
      const ROBOT_NAME = 'e-puck';
      const SECRET_TOKEN = 'MY_SECRET';
      let webotsView = new WebotsView();
      document.body.appendChild(webotsView);
      webotsView.onready = () => {
        const sendToken = () => {
          const socket = webotsView._view?.stream?.socket;
          if (socket && socket.readyState === WebSocket.OPEN) {
            socket.send('robot:' + ROBOT_NAME + ':token:' + SECRET_TOKEN);
            console.log('Secret token sent to controller.');
          } else
            setTimeout(sendToken, 100);
        };
        sendToken();
      };
      webotsView.connect('https://simulation.webots.cloud/1999/session?url=https://github.com/cyberbotics/artificialbrains2025a/blob/main/worlds/receive_token.wbt', undefined, undefined, undefined, 900);
    </script>
  </body>

</html>
